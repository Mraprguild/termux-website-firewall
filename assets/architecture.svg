<svg width="1100" height="420" viewBox="0 0 1100 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151b33"/>
      <stop offset="100%" stop-color="#090d1d"/>
    </linearGradient>
    <style>
      text{font-family:Arial,Helvetica,sans-serif}
      .h{font-size:30px;font-weight:800;fill:white}
      .p{font-size:20px;fill:#dce6ff}
      .code{font-family:monospace;font-size:20px;fill:#83ffb1}
      .arrow{stroke:#ff3040;stroke-width:8;stroke-linecap:round;marker-end:url(#m)}
    </style>
    <marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ff3040"/>
    </marker>
  </defs>
  <rect width="1100" height="420" rx="30" fill="#070a16"/>
  <rect x="55" y="105" width="250" height="190" rx="24" fill="url(#card)" stroke="#2c3869"/>
  <text x="98" y="165" class="h">Visitor</text>
  <text x="92" y="205" class="p">Browser / App</text>
  <text x="92" y="238" class="code">HTTP Request</text>

  <line x1="320" y1="200" x2="430" y2="200" class="arrow"/>

  <rect x="445" y="70" width="290" height="260" rx="24" fill="url(#card)" stroke="#ff3040"/>
  <text x="493" y="140" class="h">Termux Firewall</text>
  <text x="486" y="184" class="p">Rules + Rate Limit</text>
  <text x="486" y="218" class="p">IP Block + Logs</text>
  <text x="486" y="252" class="code">Port :8080</text>

  <line x1="750" y1="200" x2="860" y2="200" class="arrow"/>

  <rect x="875" y="105" width="170" height="190" rx="24" fill="url(#card)" stroke="#2c3869"/>
  <text x="916" y="165" class="h">Backend</text>
  <text x="907" y="205" class="p">Website</text>
  <text x="908" y="238" class="code">:8000</text>

  <text x="170" y="365" class="p">User traffic is checked before reaching your real website/backend.</text>
</svg>

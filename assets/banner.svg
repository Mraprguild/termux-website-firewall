<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#070A16">
        <animate attributeName="stop-color" values="#070A16;#111B3D;#070A16" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#141B3D">
        <animate attributeName="stop-color" values="#141B3D;#FF3040;#141B3D" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#070A16">
        <animate attributeName="stop-color" values="#070A16;#051B2E;#070A16" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-weight:900;font-size:58px;fill:#fff}
      .sub{font-family:Arial,Helvetica,sans-serif;font-size:25px;fill:#d9e3ff}
      .small{font-family:monospace;font-size:22px;fill:#83ffb1}
      .terminal{font-family:monospace;font-size:22px;fill:#ffffff}
      .pulse{animation:pulse 1.4s infinite ease-in-out;transform-origin:center}
      @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
      .float{animation:float 4s infinite ease-in-out}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    </style>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <circle cx="1050" cy="80" r="110" fill="#FF3040" opacity=".12" class="pulse"/>
  <circle cx="130" cy="290" r="140" fill="#2EA8FF" opacity=".12" class="pulse"/>

  <g class="float">
    <path d="M145 88 L235 122 V185 C235 246 196 289 145 306 C94 289 55 246 55 185 V122 L145 88Z" fill="#FF3040" opacity=".98" filter="url(#glow)"/>
    <path d="M145 113 L211 138 V185 C211 230 184 262 145 278 C106 262 79 230 79 185 V138 L145 113Z" fill="#11172F"/>
    <path d="M113 183 L136 206 L184 155" stroke="#83ffb1" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="280" y="120" class="title">Mraprguild Termux Firewall</text>
  <text x="280" y="164" class="sub">Defensive Website Firewall • Mini WAF • Reverse Proxy • Security Logs</text>

  <rect x="280" y="205" width="760" height="84" rx="18" fill="#050812" opacity=".86" stroke="#2b365f"/>
  <circle cx="314" cy="233" r="7" fill="#ff5f57"/>
  <circle cx="338" cy="233" r="7" fill="#ffbd2e"/>
  <circle cx="362" cy="233" r="7" fill="#28c840"/>
  <text x="304" y="268" class="terminal">$ bash start.sh</text>
  <text x="500" y="268" class="small">HTTP shield running on :8080</text>

  <text x="280" y="325" class="sub">SQLi • XSS • Path Traversal • Bad Bots • Rate Limit • IP Block</text>
</svg>

<svg width="950" height="430" viewBox="0 0 950 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:24px}
      .green{fill:#80ff9f}.white{fill:#eef3ff}.red{fill:#ff6673}.dim{fill:#93a4c7}
      .line{opacity:0}
      #l1{animation:show 1s .2s forwards}
      #l2{animation:show 1s 1.2s forwards}
      #l3{animation:show 1s 2.2s forwards}
      #l4{animation:show 1s 3.2s forwards}
      #l5{animation:show 1s 4.2s forwards}
      #l6{animation:show 1s 5.2s forwards}
      @keyframes show{to{opacity:1}}
      .cursor{animation:blink .8s infinite}
      @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    </style>
  </defs>
  <rect width="950" height="430" rx="24" fill="#070a16"/>
  <rect x="0" y="0" width="950" height="54" rx="24" fill="#121831"/>
  <circle cx="32" cy="27" r="8" fill="#ff5f57"/>
  <circle cx="58" cy="27" r="8" fill="#ffbd2e"/>
  <circle cx="84" cy="27" r="8" fill="#28c840"/>

  <text id="l1" class="line mono green" x="35" y="100">$ unzip mraprguild-termux-website-firewall.zip</text>
  <text id="l2" class="line mono green" x="35" y="145">$ cd mraprguild-termux-website-firewall</text>
  <text id="l3" class="line mono green" x="35" y="190">$ bash install.sh</text>
  <text id="l4" class="line mono dim" x="35" y="235">✓ packages installed • rules loaded • logs ready</text>
  <text id="l5" class="line mono green" x="35" y="280">$ bash start.sh</text>
  <text id="l6" class="line mono white" x="35" y="325">🛡️ Firewall online → http://127.0.0.1:8080</text>
  <rect class="cursor" x="35" y="356" width="14" height="26" fill="#80ff9f"/>
</svg>
